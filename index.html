<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Garaż 2026</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .karta {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(140, 0, 255, 0.5);
            text-align: center;
            border: 1px solid #5900ff;
        }
        h1 {
            color: #5900ff;
            margin-bottom: 10px;
        }
        button {
            background-color: #5900ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #5900ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="karta">
        <h1>Projekt: TYLKO BMW</h1>
        <p>Status: Nowe BMW. Cel: BMW</p>
        <button onclick="alert(TYLKO BMWW WRRRUM)">Lecimy</button>
    </div>

</body>
</html>
